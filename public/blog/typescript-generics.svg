<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c0a"/>
      <stop offset="100%" style="stop-color:#10181a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#00c9ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#3dd68c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Code editor panel (right) -->
  <g transform="translate(660, 50)">
    <rect x="0" y="0" width="490" height="540" rx="16" fill="rgba(12,18,14,0.95)" stroke="rgba(65,184,131,0.2)" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="490" height="44" rx="16" fill="rgba(20,30,22,0.9)"/>
    <circle cx="22" cy="22" r="6" fill="rgba(255,95,87,0.7)"/>
    <circle cx="42" cy="22" r="6" fill="rgba(254,188,46,0.7)"/>
    <circle cx="62" cy="22" r="6" fill="rgba(40,200,64,0.7)"/>
    <text x="245" y="29" text-anchor="middle" fill="rgba(65,184,131,0.4)" font-size="12" font-family="monospace">generics.ts</text>

    <!-- Line numbers -->
    <text x="20" y="76"  fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">1</text>
    <text x="20" y="100" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">2</text>
    <text x="20" y="124" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">3</text>
    <text x="20" y="148" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">4</text>
    <text x="20" y="172" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">5</text>
    <text x="20" y="220" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">8</text>
    <text x="20" y="244" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">9</text>
    <text x="20" y="268" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">10</text>
    <text x="20" y="316" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">14</text>
    <text x="20" y="340" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">15</text>
    <text x="20" y="364" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">16</text>
    <text x="20" y="388" fill="rgba(65,184,131,0.2)" font-size="12" font-family="monospace">17</text>

    <!-- Code lines -->
    <!-- function identity -->
    <text x="48" y="76"  fill="rgba(0,201,255,0.8)"  font-size="13" font-family="monospace">function </text>
    <text x="148" y="76" fill="#3dd68c"               font-size="13" font-family="monospace">identity</text>
    <text x="228" y="76" fill="rgba(65,184,131,0.9)"  font-size="13" font-family="monospace">&lt;</text>
    <text x="242" y="76" fill="#41b883"               font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="254" y="76" fill="rgba(65,184,131,0.9)"  font-size="13" font-family="monospace">&gt;(value: </text>
    <text x="328" y="76" fill="#41b883"               font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="340" y="76" fill="rgba(138,185,155,0.9)" font-size="13" font-family="monospace">): </text>
    <text x="368" y="76" fill="#41b883"               font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="380" y="76" fill="rgba(138,185,155,0.7)" font-size="13" font-family="monospace"> {"{"}</text>

    <text x="48" y="100" fill="rgba(138,185,155,0.5)" font-size="13" font-family="monospace">  return value;</text>
    <text x="48" y="124" fill="rgba(138,185,155,0.7)" font-size="13" font-family="monospace">{"}"}</text>

    <!-- Highlight box for T -->
    <rect x="238" y="62" width="20" height="18" rx="3" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>

    <!-- type ApiResponse -->
    <text x="48" y="172" fill="rgba(0,201,255,0.8)"  font-size="13" font-family="monospace">type </text>
    <text x="96" y="172" fill="#3dd68c"               font-size="13" font-family="monospace">ApiResponse</text>
    <text x="220" y="172" fill="rgba(65,184,131,0.9)" font-size="13" font-family="monospace">&lt;</text>
    <text x="234" y="172" fill="#41b883"              font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="246" y="172" fill="rgba(65,184,131,0.9)" font-size="13" font-family="monospace">&gt; = {"{"}</text>
    <text x="48" y="196" fill="rgba(138,185,155,0.6)" font-size="13" font-family="monospace">  data: </text>
    <text x="116" y="196" fill="#41b883"              font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="128" y="196" fill="rgba(138,185,155,0.5)" font-size="13" font-family="monospace">;</text>
    <text x="48" y="220" fill="rgba(138,185,155,0.6)" font-size="13" font-family="monospace">  status: </text>
    <text x="136" y="220" fill="#00c9ff"              font-size="13" font-family="monospace">number</text>
    <text x="208" y="220" fill="rgba(138,185,155,0.5)" font-size="13" font-family="monospace">;</text>
    <text x="48" y="244" fill="rgba(138,185,155,0.6)" font-size="13" font-family="monospace">  message: </text>
    <text x="148" y="244" fill="#00c9ff"              font-size="13" font-family="monospace">string</text>
    <text x="214" y="244" fill="rgba(138,185,155,0.5)" font-size="13" font-family="monospace">;</text>
    <text x="48" y="268" fill="rgba(138,185,155,0.7)" font-size="13" font-family="monospace">{"}"}</text>

    <!-- Divider line -->
    <line x1="20" y1="290" x2="470" y2="290" stroke="rgba(65,184,131,0.08)" stroke-width="1"/>

    <!-- useLocalStorage hook -->
    <text x="48" y="316" fill="rgba(0,201,255,0.8)"  font-size="13" font-family="monospace">function </text>
    <text x="148" y="316" fill="#3dd68c"              font-size="13" font-family="monospace">useLocalStorage</text>
    <text x="302" y="316" fill="rgba(65,184,131,0.9)" font-size="13" font-family="monospace">&lt;</text>
    <text x="316" y="316" fill="#41b883"              font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="328" y="316" fill="rgba(65,184,131,0.9)" font-size="13" font-family="monospace">&gt;(</text>
    <text x="48" y="340" fill="rgba(138,185,155,0.6)" font-size="13" font-family="monospace">  key: </text>
    <text x="108" y="340" fill="#00c9ff"              font-size="13" font-family="monospace">string</text>
    <text x="174" y="340" fill="rgba(138,185,155,0.5)" font-size="13" font-family="monospace">,</text>
    <text x="48" y="364" fill="rgba(138,185,155,0.6)" font-size="13" font-family="monospace">  initial: </text>
    <text x="136" y="364" fill="#41b883"              font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="148" y="364" fill="rgba(138,185,155,0.5)" font-size="13" font-family="monospace">,</text>
    <text x="48" y="388" fill="rgba(138,185,155,0.6)" font-size="13" font-family="monospace">): [</text>
    <text x="92"  y="388" fill="#41b883"              font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="104" y="388" fill="rgba(138,185,155,0.6)" font-size="13" font-family="monospace">, Dispatch&lt;</text>
    <text x="216" y="388" fill="#41b883"              font-size="13" font-family="monospace" font-weight="700">T</text>
    <text x="228" y="388" fill="rgba(138,185,155,0.6)" font-size="13" font-family="monospace">&gt;]</text>

    <!-- TypeScript logo badge -->
    <rect x="390" y="460" width="80" height="60" rx="10" fill="rgba(0,122,204,0.25)" stroke="rgba(0,122,204,0.4)" stroke-width="1.5"/>
    <text x="430" y="498" text-anchor="middle" fill="rgba(0,160,255,0.9)" font-size="24" font-family="'Inter',sans-serif" font-weight="900">TS</text>
  </g>

  <!-- Tag pill -->
  <rect x="100" y="90" width="130" height="30" rx="15" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
  <text x="165" y="110" text-anchor="middle" fill="#41b883" font-size="12" font-family="'Inter',sans-serif" font-weight="600">TypeScript</text>

  <!-- Heading -->
  <text x="100" y="200" fill="#e8f5ee" font-size="54" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">TypeScript</text>
  <text x="100" y="262" fill="url(#g1)" font-size="54" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Generics</text>
  <text x="100" y="316" fill="rgba(138,185,155,0.65)" font-size="32" font-family="'Inter',sans-serif" font-weight="600">for Frontend Devs</text>

  <!-- Feature list -->
  <text x="110" y="374" fill="#41b883" font-size="15" font-family="monospace">▸  Generic functions &amp; interfaces</text>
  <text x="110" y="400" fill="#3dd68c" font-size="15" font-family="monospace">▸  Constrained generics with extends</text>
  <text x="110" y="426" fill="#00c9ff" font-size="15" font-family="monospace">▸  Generic React components &amp; hooks</text>
  <text x="110" y="452" fill="rgba(65,184,131,0.7)" font-size="15" font-family="monospace">▸  Utility types: Partial, Pick, Omit</text>

  <!-- Divider -->
  <line x1="100" y1="485" x2="530" y2="485" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>

  <!-- Author -->
  <circle cx="116" cy="525" r="18" fill="url(#g1)"/>
  <text x="116" y="531" text-anchor="middle" fill="white" font-size="13" font-family="'Inter',sans-serif" font-weight="700">MK</text>
  <text x="145" y="520" fill="#e8f5ee" font-size="14" font-family="'Inter',sans-serif" font-weight="600">Mehran Khan</text>
  <text x="145" y="538" fill="rgba(138,185,155,0.7)" font-size="12" font-family="'Inter',sans-serif">11 min read  ·  Jan 2024</text>
</svg>
