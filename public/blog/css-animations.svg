<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090e0b"/>
      <stop offset="100%" style="stop-color:#111a13"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#3dd68c"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3dd68c"/><stop offset="100%" style="stop-color:#00c9ff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="25" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Easing curve visualizer (right panel) -->
  <g transform="translate(680, 60)">
    <rect x="0" y="0" width="460" height="500" rx="16" fill="rgba(14,22,16,0.9)" stroke="rgba(65,184,131,0.18)" stroke-width="1.5"/>
    <text x="230" y="32" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="13" font-family="monospace">transition-timing-function</text>

    <!-- Easing curves -->
    <!-- ease-in-out -->
    <text x="30" y="78" fill="rgba(65,184,131,0.6)" font-size="12" font-family="monospace">ease-in-out</text>
    <rect x="30" y="88" width="400" height="50" rx="6" fill="rgba(65,184,131,0.05)"/>
    <path d="M 40 128 C 80 128 120 98 230 108 C 340 118 380 98 420 98" fill="none" stroke="#41b883" stroke-width="2.5"/>
    <!-- Moving dot -->
    <circle cx="230" cy="108" r="6" fill="#41b883" opacity="0.8" filter="url(#glow)"/>

    <!-- ease-out -->
    <text x="30" y="170" fill="rgba(61,214,140,0.6)" font-size="12" font-family="monospace">ease-out  (spring-like)</text>
    <rect x="30" y="180" width="400" height="50" rx="6" fill="rgba(61,214,140,0.05)"/>
    <path d="M 40 220 C 60 180 120 190 200 192 C 280 194 360 190 420 190" fill="none" stroke="#3dd68c" stroke-width="2.5"/>
    <circle cx="200" cy="192" r="6" fill="#3dd68c" opacity="0.8" filter="url(#glow)"/>

    <!-- cubic-bezier -->
    <text x="30" y="262" fill="rgba(0,201,255,0.6)" font-size="12" font-family="monospace">cubic-bezier(0.22, 1, 0.36, 1)</text>
    <rect x="30" y="272" width="400" height="50" rx="6" fill="rgba(0,201,255,0.05)"/>
    <path d="M 40 312 C 56 280 100 280 180 282 C 260 284 360 278 420 278" fill="none" stroke="#00c9ff" stroke-width="2.5"/>
    <circle cx="180" cy="282" r="6" fill="#00c9ff" opacity="0.8" filter="url(#glow)"/>

    <!-- Keyframe timeline -->
    <text x="30" y="358" fill="rgba(65,184,131,0.45)" font-size="12" font-family="monospace">@keyframes  timeline</text>
    <rect x="30" y="370" width="400" height="44" rx="6" fill="rgba(65,184,131,0.05)" stroke="rgba(65,184,131,0.1)" stroke-width="1"/>
    <!-- Timeline track -->
    <line x1="50" y1="392" x2="410" y2="392" stroke="rgba(65,184,131,0.2)" stroke-width="2"/>
    <!-- Keyframe markers -->
    <circle cx="50"  cy="392" r="6" fill="#41b883" opacity="0.9"/>
    <text x="50"  y="408" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="9" font-family="monospace">0%</text>
    <circle cx="140" cy="392" r="5" fill="#3dd68c" opacity="0.7"/>
    <text x="140" y="408" text-anchor="middle" fill="rgba(61,214,140,0.5)" font-size="9" font-family="monospace">25%</text>
    <circle cx="230" cy="392" r="7" fill="#41b883" opacity="0.85" filter="url(#glow)"/>
    <text x="230" y="408" text-anchor="middle" fill="rgba(65,184,131,0.6)" font-size="9" font-family="monospace">50%</text>
    <circle cx="320" cy="392" r="5" fill="#3dd68c" opacity="0.7"/>
    <text x="320" y="408" text-anchor="middle" fill="rgba(61,214,140,0.5)" font-size="9" font-family="monospace">75%</text>
    <circle cx="410" cy="392" r="6" fill="#41b883" opacity="0.9"/>
    <text x="410" y="408" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="9" font-family="monospace">100%</text>

    <!-- Animated preview card -->
    <rect x="30" y="428" width="400" height="52" rx="10" fill="rgba(65,184,131,0.1)" stroke="rgba(65,184,131,0.25)" stroke-width="1.5"/>
    <text x="230" y="450" text-anchor="middle" fill="#41b883" font-size="12" font-family="monospace">animation: fadeUp 0.6s ease-out</text>
    <text x="230" y="468" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="11" font-family="monospace">transform: translateY(-20px) → translateY(0)</text>
  </g>

  <!-- Glow blob -->
  <circle cx="200" cy="500" r="140" fill="rgba(65,184,131,0.06)" filter="url(#softglow)"/>

  <!-- Tag pill -->
  <rect x="100" y="90" width="150" height="30" rx="15" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
  <text x="175" y="110" text-anchor="middle" fill="#41b883" font-size="12" font-family="'Inter',sans-serif" font-weight="600">CSS Animations</text>

  <!-- Heading -->
  <text x="100" y="200" fill="#e8f5ee" font-size="56" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">CSS Animations</text>
  <text x="100" y="264" fill="url(#g1)" font-size="56" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">&amp; Transitions</text>
  <text x="100" y="316" fill="rgba(138,185,155,0.65)" font-size="30" font-family="'Inter',sans-serif" font-weight="600">The Complete Guide</text>

  <!-- Feature list -->
  <text x="110" y="374" fill="#41b883" font-size="15" font-family="monospace">▸  @keyframes &amp; animation properties</text>
  <text x="110" y="400" fill="#3dd68c" font-size="15" font-family="monospace">▸  cubic-bezier &amp; easing functions</text>
  <text x="110" y="426" fill="#00c9ff" font-size="15" font-family="monospace">▸  transform, will-change &amp; GPU</text>
  <text x="110" y="452" fill="rgba(65,184,131,0.7)" font-size="15" font-family="monospace">▸  scroll-driven animations</text>

  <!-- Divider -->
  <line x1="100" y1="484" x2="520" y2="484" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>

  <!-- Author -->
  <circle cx="116" cy="524" r="18" fill="url(#g1)"/>
  <text x="116" y="530" text-anchor="middle" fill="white" font-size="13" font-family="'Inter',sans-serif" font-weight="700">MK</text>
  <text x="145" y="519" fill="#e8f5ee" font-size="14" font-family="'Inter',sans-serif" font-weight="600">Mehran Khan</text>
  <text x="145" y="537" fill="rgba(138,185,155,0.7)" font-size="12" font-family="'Inter',sans-serif">8 min read  ·  Feb 2024</text>
</svg>
