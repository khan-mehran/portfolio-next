<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a10"/>
      <stop offset="100%" style="stop-color:#0a0f0d"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#41b883"/>
      <stop offset="50%" style="stop-color:#3dd68c"/>
      <stop offset="100%" style="stop-color:#00c9ff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="15" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Animated motion path -->
  <path d="M 800 150 Q 950 80 1050 200 Q 1150 320 1000 420 Q 850 520 750 450" fill="none" stroke="rgba(65,184,131,0.15)" stroke-width="80" stroke-linecap="round"/>
  <path d="M 800 150 Q 950 80 1050 200 Q 1150 320 1000 420 Q 850 520 750 450" fill="none" stroke="rgba(65,184,131,0.3)" stroke-width="3" stroke-dasharray="12 8"/>

  <!-- Motion dots along path -->
  <circle cx="800" cy="150" r="12" fill="#41b883" opacity="0.9" filter="url(#glow)"/>
  <circle cx="900" cy="120" r="9" fill="#3dd68c" opacity="0.7"/>
  <circle cx="1000" cy="200" r="11" fill="#41b883" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1060" cy="310" r="8" fill="#3dd68c" opacity="0.6"/>
  <circle cx="970" cy="420" r="10" fill="#41b883" opacity="0.75" filter="url(#glow)"/>
  <circle cx="850" cy="480" r="7" fill="#3dd68c" opacity="0.5"/>

  <!-- Floating card mockups -->
  <rect x="840" y="220" width="180" height="110" rx="12" fill="rgba(22,33,25,0.9)" stroke="rgba(65,184,131,0.3)" stroke-width="1.5"/>
  <text x="930" y="262" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="11" font-family="monospace">whileHover</text>
  <rect x="870" y="272" width="120" height="8" rx="4" fill="rgba(65,184,131,0.2)"/>
  <rect x="870" y="288" width="80" height="8" rx="4" fill="rgba(65,184,131,0.12)"/>
  <text x="930" y="320" text-anchor="middle" fill="rgba(65,184,131,0.4)" font-size="10" font-family="monospace">scale: 1.05</text>

  <!-- AnimatePresence label -->
  <rect x="960" y="360" width="160" height="28" rx="14" fill="rgba(65,184,131,0.1)" stroke="rgba(65,184,131,0.3)" stroke-width="1"/>
  <text x="1040" y="379" text-anchor="middle" fill="#3dd68c" font-size="11" font-family="monospace">AnimatePresence</text>

  <!-- Tag pill -->
  <rect x="100" y="90" width="130" height="30" rx="15" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
  <text x="165" y="110" text-anchor="middle" fill="#41b883" font-size="12" font-family="'Inter',sans-serif" font-weight="600">Framer Motion</text>

  <!-- Main heading -->
  <text x="100" y="200" fill="#e8f5ee" font-size="58" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Advanced</text>
  <text x="100" y="268" fill="url(#acc)" font-size="58" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Animation Patterns</text>

  <!-- Subtext -->
  <text x="100" y="330" fill="rgba(138,185,155,0.8)" font-size="21" font-family="'Inter',sans-serif">layoutId · AnimatePresence · Gestures · Variants</text>

  <!-- Divider -->
  <line x1="100" y1="378" x2="480" y2="378" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>

  <!-- Author -->
  <circle cx="116" cy="418" r="18" fill="url(#acc)"/>
  <text x="116" y="424" text-anchor="middle" fill="white" font-size="13" font-family="'Inter',sans-serif" font-weight="700">MK</text>
  <text x="145" y="413" fill="#e8f5ee" font-size="14" font-family="'Inter',sans-serif" font-weight="600">Mehran Khan</text>
  <text x="145" y="431" fill="rgba(138,185,155,0.7)" font-size="12" font-family="'Inter',sans-serif">6 min read  ·  June 2024</text>
</svg>
