<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f0a"/>
      <stop offset="100%" style="stop-color:#121c14"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#2d9768"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3dd68c"/><stop offset="100%" style="stop-color:#00c9ff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid demo (right panel) -->
  <g transform="translate(700, 60)">
    <!-- Grid outline -->
    <rect x="0" y="0" width="430" height="500" rx="16" fill="rgba(22,33,25,0.7)" stroke="rgba(65,184,131,0.2)" stroke-width="1.5"/>

    <!-- CSS code header -->
    <rect x="0" y="0" width="430" height="44" rx="16" fill="rgba(65,184,131,0.08)"/>
    <text x="20" y="27" fill="rgba(65,184,131,0.5)" font-size="12" font-family="monospace">display: grid;</text>
    <text x="230" y="27" fill="rgba(65,184,131,0.4)" font-size="12" font-family="monospace">grid-template-columns: ...</text>

    <!-- Grid cells -->
    <!-- Header - full width -->
    <rect x="16" y="58"  width="398" height="64" rx="8" fill="rgba(65,184,131,0.25)" stroke="rgba(65,184,131,0.5)" stroke-width="1.5"/>
    <text x="215" y="95"  text-anchor="middle" fill="#41b883" font-size="13" font-family="monospace" font-weight="700">header  ·  grid-column: 1 / -1</text>

    <!-- Sidebar + main -->
    <rect x="16" y="134" width="110" height="240" rx="8" fill="rgba(45,151,104,0.2)" stroke="rgba(65,184,131,0.35)" stroke-width="1.5"/>
    <text x="71"  y="258" text-anchor="middle" fill="#2d9768" font-size="11" font-family="monospace">sidebar</text>
    <text x="71"  y="274" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="10" font-family="monospace">col: 1/2</text>

    <rect x="138" y="134" width="276" height="115" rx="8" fill="rgba(61,214,140,0.15)" stroke="rgba(61,214,140,0.3)" stroke-width="1.5"/>
    <text x="276" y="194" text-anchor="middle" fill="#3dd68c" font-size="12" font-family="monospace" font-weight="700">main content</text>
    <text x="276" y="212" text-anchor="middle" fill="rgba(61,214,140,0.5)" font-size="10" font-family="monospace">col: 2 / 4  ·  row: 2</text>

    <rect x="138" y="259" width="130" height="115" rx="8" fill="rgba(0,201,255,0.12)" stroke="rgba(0,201,255,0.25)" stroke-width="1.5"/>
    <text x="203" y="320" text-anchor="middle" fill="#00c9ff" font-size="11" font-family="monospace">card</text>

    <rect x="284" y="259" width="130" height="115" rx="8" fill="rgba(0,201,255,0.12)" stroke="rgba(0,201,255,0.25)" stroke-width="1.5"/>
    <text x="349" y="320" text-anchor="middle" fill="#00c9ff" font-size="11" font-family="monospace">card</text>

    <!-- Footer - full width -->
    <rect x="16" y="386" width="398" height="52" rx="8" fill="rgba(65,184,131,0.12)" stroke="rgba(65,184,131,0.25)" stroke-width="1.5"/>
    <text x="215" y="418" text-anchor="middle" fill="rgba(65,184,131,0.6)" font-size="12" font-family="monospace">footer  ·  grid-column: 1 / -1</text>

    <!-- Grid lines overlay -->
    <line x1="128" y1="54"  x2="128" y2="444" stroke="rgba(65,184,131,0.12)" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="278" y1="54"  x2="278" y2="444" stroke="rgba(65,184,131,0.12)" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Tag pill -->
  <rect x="100" y="90" width="120" height="30" rx="15" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
  <text x="160" y="110" text-anchor="middle" fill="#41b883" font-size="12" font-family="'Inter',sans-serif" font-weight="600">CSS Grid</text>

  <!-- Heading -->
  <text x="100" y="200" fill="#e8f5ee" font-size="62" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">CSS Grid</text>
  <text x="100" y="270" fill="url(#g1)" font-size="62" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Mastery</text>

  <!-- Subtext -->
  <text x="100" y="334" fill="rgba(138,185,155,0.85)" font-size="21" font-family="'Inter',sans-serif">Build any layout you can imagine</text>

  <!-- Feature list -->
  <text x="110" y="390" fill="#41b883" font-size="15" font-family="monospace">▸  grid-template-areas</text>
  <text x="110" y="416" fill="#3dd68c" font-size="15" font-family="monospace">▸  minmax()  &amp;  auto-fill</text>
  <text x="110" y="442" fill="#00c9ff" font-size="15" font-family="monospace">▸  subgrid  &amp;  named lines</text>

  <!-- Divider -->
  <line x1="100" y1="476" x2="450" y2="476" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>

  <!-- Author -->
  <circle cx="116" cy="516" r="18" fill="url(#g1)"/>
  <text x="116" y="522" text-anchor="middle" fill="white" font-size="13" font-family="'Inter',sans-serif" font-weight="700">MK</text>
  <text x="145" y="511" fill="#e8f5ee" font-size="14" font-family="'Inter',sans-serif" font-weight="600">Mehran Khan</text>
  <text x="145" y="529" fill="rgba(138,185,155,0.7)" font-size="12" font-family="'Inter',sans-serif">9 min read  ·  April 2024</text>
</svg>
