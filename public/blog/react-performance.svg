<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e0a"/>
      <stop offset="100%" style="stop-color:#101810"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#3dd68c"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#2d9768"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3dd68c"/><stop offset="100%" style="stop-color:#41b883"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Profiler panel (right) -->
  <g transform="translate(700, 60)">
    <rect x="0" y="0" width="430" height="500" rx="16" fill="rgba(16,24,16,0.9)" stroke="rgba(65,184,131,0.2)" stroke-width="1.5"/>

    <!-- Panel header -->
    <rect x="0" y="0" width="430" height="44" rx="16" fill="rgba(65,184,131,0.08)"/>
    <circle cx="22" cy="22" r="6" fill="rgba(255,95,87,0.8)"/>
    <circle cx="42" cy="22" r="6" fill="rgba(254,188,46,0.8)"/>
    <circle cx="62" cy="22" r="6" fill="rgba(40,200,64,0.8)"/>
    <text x="200" y="29" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="12" font-family="monospace">React Profiler</text>

    <!-- Flame graph bars -->
    <text x="16" y="72" fill="rgba(65,184,131,0.5)" font-size="11" font-family="monospace">Component render times (ms)</text>

    <!-- App -->
    <rect x="16" y="84"  width="398" height="28" rx="4" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>
    <text x="26" y="103" fill="rgba(65,184,131,0.7)" font-size="11" font-family="monospace">App</text>
    <text x="390" y="103" text-anchor="end" fill="rgba(65,184,131,0.5)" font-size="10" font-family="monospace">12ms</text>

    <!-- Sidebar -->
    <rect x="16" y="120" width="120" height="26" rx="4" fill="rgba(45,151,104,0.2)" stroke="rgba(45,151,104,0.3)" stroke-width="1"/>
    <text x="26" y="138" fill="rgba(45,151,104,0.8)" font-size="11" font-family="monospace">Sidebar  2ms</text>

    <!-- Before memo -->
    <rect x="148" y="120" width="266" height="26" rx="4" fill="rgba(255,95,87,0.2)" stroke="rgba(255,95,87,0.35)" stroke-width="1"/>
    <text x="158" y="138" fill="rgba(255,120,100,0.9)" font-size="11" font-family="monospace">ProductList  ❌ 8ms</text>

    <!-- After memo -->
    <rect x="148" y="152" width="120" height="26" rx="4" fill="rgba(65,184,131,0.25)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
    <text x="158" y="170" fill="#41b883" font-size="11" font-family="monospace">ProductList ✓ 1ms</text>
    <text x="278" y="170" fill="#3dd68c" font-size="10" font-family="monospace">memo()</text>

    <!-- useMemo / useCallback bars -->
    <text x="16" y="210" fill="rgba(65,184,131,0.4)" font-size="11" font-family="monospace">─── Hook optimization</text>
    <rect x="16" y="220" width="200" height="36" rx="6" fill="rgba(61,214,140,0.12)" stroke="rgba(61,214,140,0.25)" stroke-width="1.5"/>
    <text x="26" y="237" fill="#3dd68c" font-size="12" font-family="monospace" font-weight="700">useMemo</text>
    <text x="26" y="252" fill="rgba(61,214,140,0.6)" font-size="10" font-family="monospace">expensive calc cached</text>

    <rect x="228" y="220" width="186" height="36" rx="6" fill="rgba(0,201,255,0.1)" stroke="rgba(0,201,255,0.22)" stroke-width="1.5"/>
    <text x="238" y="237" fill="#00c9ff" font-size="12" font-family="monospace" font-weight="700">useCallback</text>
    <text x="238" y="252" fill="rgba(0,201,255,0.6)" font-size="10" font-family="monospace">stable ref for props</text>

    <!-- Bundle size bar chart -->
    <text x="16" y="288" fill="rgba(65,184,131,0.4)" font-size="11" font-family="monospace">─── Bundle size (before vs after)</text>
    <text x="16" y="316" fill="rgba(138,185,155,0.6)" font-size="10" font-family="monospace">Before</text>
    <rect x="70"  y="304" width="280" height="16" rx="4" fill="rgba(255,95,87,0.3)" stroke="rgba(255,95,87,0.4)" stroke-width="1"/>
    <text x="360" y="316" fill="rgba(255,120,100,0.8)" font-size="10" font-family="monospace">842 kB</text>

    <text x="16"  y="342" fill="rgba(138,185,155,0.6)" font-size="10" font-family="monospace">After</text>
    <rect x="70"  y="330" width="148" height="16" rx="4" fill="rgba(65,184,131,0.35)" stroke="rgba(65,184,131,0.5)" stroke-width="1"/>
    <text x="228" y="342" fill="#41b883" font-size="10" font-family="monospace">312 kB  (-63%)</text>

    <!-- Lighthouse score -->
    <rect x="16" y="368" width="398" height="88" rx="10" fill="rgba(65,184,131,0.06)" stroke="rgba(65,184,131,0.15)" stroke-width="1"/>
    <text x="215" y="392" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="11" font-family="monospace">Lighthouse Performance Score</text>
    <text x="215" y="438" text-anchor="middle" fill="#41b883" font-size="44" font-family="'Inter',sans-serif" font-weight="900" filter="url(#glow)">98</text>
  </g>

  <!-- Tag pill -->
  <rect x="100" y="90" width="130" height="30" rx="15" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
  <text x="165" y="110" text-anchor="middle" fill="#41b883" font-size="12" font-family="'Inter',sans-serif" font-weight="600">Performance</text>

  <!-- Heading -->
  <text x="100" y="196" fill="#e8f5ee" font-size="56" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">React</text>
  <text x="100" y="258" fill="url(#g1)" font-size="56" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Performance</text>
  <text x="100" y="316" fill="rgba(138,185,155,0.7)" font-size="40" font-family="'Inter',sans-serif" font-weight="700">Deep Dive</text>

  <!-- Feature list -->
  <text x="110" y="375" fill="#41b883" font-size="15" font-family="monospace">▸  React.memo &amp; re-render prevention</text>
  <text x="110" y="401" fill="#3dd68c" font-size="15" font-family="monospace">▸  useMemo &amp; useCallback</text>
  <text x="110" y="427" fill="#00c9ff" font-size="15" font-family="monospace">▸  Code splitting &amp; lazy loading</text>

  <!-- Divider -->
  <line x1="100" y1="458" x2="500" y2="458" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>

  <!-- Author -->
  <circle cx="116" cy="498" r="18" fill="url(#g1)"/>
  <text x="116" y="504" text-anchor="middle" fill="white" font-size="13" font-family="'Inter',sans-serif" font-weight="700">MK</text>
  <text x="145" y="493" fill="#e8f5ee" font-size="14" font-family="'Inter',sans-serif" font-weight="600">Mehran Khan</text>
  <text x="145" y="511" fill="rgba(138,185,155,0.7)" font-size="12" font-family="'Inter',sans-serif">10 min read  ·  March 2024</text>
</svg>
