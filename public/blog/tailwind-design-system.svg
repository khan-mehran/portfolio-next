<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1208"/>
      <stop offset="100%" style="stop-color:#111a15"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#2d9768"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3dd68c"/><stop offset="100%" style="stop-color:#00c9ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Color swatches grid (right side) -->
  <g transform="translate(760, 80)">
    <!-- Row 1 -->
    <rect x="0"   y="0"   width="70" height="70" rx="10" fill="#41b883"/>
    <rect x="80"  y="0"   width="70" height="70" rx="10" fill="#2d9768"/>
    <rect x="160" y="0"   width="70" height="70" rx="10" fill="#1a6e4a"/>
    <rect x="240" y="0"   width="70" height="70" rx="10" fill="#3dd68c"/>
    <rect x="320" y="0"   width="70" height="70" rx="10" fill="#00c9ff"/>
    <!-- Row 2 -->
    <rect x="0"   y="80"  width="70" height="70" rx="10" fill="#0a0f0d"/>
    <rect x="80"  y="80"  width="70" height="70" rx="10" fill="#111a15"/>
    <rect x="160" y="80"  width="70" height="70" rx="10" fill="#162119"/>
    <rect x="240" y="80"  width="70" height="70" rx="10" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
    <rect x="320" y="80"  width="70" height="70" rx="10" fill="rgba(65,184,131,0.06)" stroke="rgba(65,184,131,0.3)" stroke-width="1"/>
    <!-- Row 3 -->
    <rect x="0"   y="160" width="70" height="70" rx="10" fill="#e8f5ee"/>
    <rect x="80"  y="160" width="70" height="70" rx="10" fill="#8ab99b"/>
    <rect x="160" y="160" width="70" height="70" rx="10" fill="#3a6b52"/>
    <rect x="240" y="160" width="70" height="70" rx="10" fill="#f0faf5"/>
    <rect x="320" y="160" width="70" height="70" rx="10" fill="#0a1f14"/>
    <!-- Color labels -->
    <text x="35"  y="165" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="monospace">brand</text>
    <text x="115" y="165" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="monospace">dark</text>
  </g>

  <!-- Component blocks (bottom-right) -->
  <rect x="780" y="370" width="370" height="52" rx="10" fill="url(#g1)" opacity="0.85"/>
  <text x="965" y="402" text-anchor="middle" fill="white" font-size="14" font-family="'Inter',sans-serif" font-weight="700">btn-primary</text>

  <rect x="780" y="432" width="370" height="52" rx="10" fill="none" stroke="#41b883" stroke-width="2" opacity="0.7"/>
  <text x="965" y="464" text-anchor="middle" fill="#41b883" font-size="14" font-family="'Inter',sans-serif" font-weight="700">btn-outline</text>

  <rect x="780" y="494" width="370" height="52" rx="10" fill="rgba(65,184,131,0.08)" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>
  <text x="965" y="526" text-anchor="middle" fill="rgba(65,184,131,0.7)" font-size="14" font-family="'Inter',sans-serif">btn-ghost</text>

  <!-- Tag pill -->
  <rect x="100" y="90" width="140" height="30" rx="15" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
  <text x="170" y="110" text-anchor="middle" fill="#41b883" font-size="12" font-family="'Inter',sans-serif" font-weight="600">Design Systems</text>

  <!-- Main heading -->
  <text x="100" y="200" fill="#e8f5ee" font-size="58" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Building a</text>
  <text x="100" y="268" fill="url(#g1)" font-size="58" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Design System</text>
  <text x="100" y="330" fill="url(#g2)" font-size="42" font-family="'Inter',sans-serif" font-weight="700">with Tailwind CSS</text>

  <!-- Subtext -->
  <text x="100" y="375" fill="rgba(138,185,155,0.8)" font-size="19" font-family="'Inter',sans-serif">Tokens · CVA Variants · Dark Mode · Component Docs</text>

  <!-- Divider -->
  <line x1="100" y1="415" x2="460" y2="415" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>

  <!-- Author -->
  <circle cx="116" cy="455" r="18" fill="url(#g1)"/>
  <text x="116" y="461" text-anchor="middle" fill="white" font-size="13" font-family="'Inter',sans-serif" font-weight="700">MK</text>
  <text x="145" y="450" fill="#e8f5ee" font-size="14" font-family="'Inter',sans-serif" font-weight="600">Mehran Khan</text>
  <text x="145" y="468" fill="rgba(138,185,155,0.7)" font-size="12" font-family="'Inter',sans-serif">7 min read  ·  May 2024</text>
</svg>
