<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f0d"/>
      <stop offset="100%" style="stop-color:#111a15"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883"/>
      <stop offset="100%" style="stop-color:#2d9768"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883"/>
      <stop offset="100%" style="stop-color:#00c9ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(65,184,131,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orb top-right -->
  <circle cx="980" cy="120" r="200" fill="rgba(65,184,131,0.08)" filter="url(#softglow)"/>
  <!-- Glow orb bottom-left -->
  <circle cx="200" cy="520" r="150" fill="rgba(0,201,255,0.06)" filter="url(#softglow)"/>

  <!-- Next.js triangle logo -->
  <g transform="translate(880,200)">
    <polygon points="0,-90 78,45 -78,45" fill="none" stroke="url(#green)" stroke-width="3" opacity="0.6"/>
    <polygon points="0,-60 52,30 -52,30" fill="rgba(65,184,131,0.1)" stroke="url(#green)" stroke-width="2" opacity="0.4"/>
    <text x="0" y="12" text-anchor="middle" fill="url(#green)" font-size="28" font-family="monospace" font-weight="900">▲</text>
  </g>

  <!-- Route lines -->
  <line x1="820" y1="300" x2="960" y2="340" stroke="rgba(65,184,131,0.25)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="820" y1="300" x2="960" y2="260" stroke="rgba(65,184,131,0.25)" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="960" y1="260" x2="1060" y2="230" stroke="rgba(65,184,131,0.2)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="960" y1="340" x2="1060" y2="370" stroke="rgba(65,184,131,0.2)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Route nodes -->
  <circle cx="820" cy="300" r="8" fill="#41b883" opacity="0.9"/>
  <circle cx="960" cy="260" r="6" fill="#3dd68c" opacity="0.7"/>
  <circle cx="960" cy="340" r="6" fill="#3dd68c" opacity="0.7"/>
  <circle cx="1060" cy="230" r="5" fill="rgba(65,184,131,0.5)"/>
  <circle cx="1060" cy="370" r="5" fill="rgba(65,184,131,0.5)"/>

  <!-- Route labels -->
  <text x="830" y="296" fill="rgba(65,184,131,0.6)" font-size="11" font-family="monospace">/app</text>
  <text x="970" y="256" fill="rgba(65,184,131,0.5)" font-size="10" font-family="monospace">layout</text>
  <text x="970" y="336" fill="rgba(65,184,131,0.5)" font-size="10" font-family="monospace">page</text>

  <!-- Tag pill -->
  <rect x="100" y="90" width="120" height="30" rx="15" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
  <text x="160" y="110" text-anchor="middle" fill="#41b883" font-size="12" font-family="'Inter',sans-serif" font-weight="600">Next.js 14</text>

  <!-- Main heading -->
  <text x="100" y="200" fill="#e8f5ee" font-size="62" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Mastering the</text>
  <text x="100" y="278" fill="url(#accent)" font-size="62" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">App Router</text>

  <!-- Subtext -->
  <text x="100" y="340" fill="rgba(138,185,155,0.85)" font-size="22" font-family="'Inter',sans-serif" font-weight="400">Layouts · Server Components · Streaming · Data Fetching</text>

  <!-- Bottom divider -->
  <line x1="100" y1="390" x2="500" y2="390" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>

  <!-- Author row -->
  <circle cx="116" cy="430" r="18" fill="url(#green)"/>
  <text x="116" y="436" text-anchor="middle" fill="white" font-size="13" font-family="'Inter',sans-serif" font-weight="700">MK</text>
  <text x="145" y="425" fill="#e8f5ee" font-size="14" font-family="'Inter',sans-serif" font-weight="600">Mehran Khan</text>
  <text x="145" y="443" fill="rgba(138,185,155,0.7)" font-size="12" font-family="'Inter',sans-serif">8 min read  ·  July 2024</text>
</svg>
