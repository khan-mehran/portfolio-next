<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060c08"/><stop offset="100%" style="stop-color:#0e1810"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#2d9768"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#41b883"/><stop offset="100%" style="stop-color:#00c9ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Server rack visual -->
  <g transform="translate(720, 70)">
    <rect x="0" y="0" width="420" height="500" rx="16" fill="rgba(12,20,14,0.9)" stroke="rgba(65,184,131,0.2)" stroke-width="1.5"/>
    <rect x="0" y="0" width="420" height="44" rx="16" fill="rgba(65,184,131,0.08)"/>
    <text x="210" y="28" text-anchor="middle" fill="rgba(65,184,131,0.5)" font-size="12" font-family="monospace">Node.js Event Loop Monitor</text>
    <!-- Event loop circle -->
    <circle cx="210" cy="190" r="100" fill="none" stroke="rgba(65,184,131,0.1)" stroke-width="20"/>
    <circle cx="210" cy="190" r="100" fill="none" stroke="url(#g1)" stroke-width="3" stroke-dasharray="200 430" stroke-linecap="round"/>
    <text x="210" y="182" text-anchor="middle" fill="#41b883" font-size="28" font-family="'Inter',sans-serif" font-weight="900">98</text>
    <text x="210" y="204" text-anchor="middle" fill="rgba(65,184,131,0.6)" font-size="12" font-family="monospace">req/s</text>
    <!-- Phase labels -->
    <text x="210" y="70"  text-anchor="middle" fill="rgba(65,184,131,0.4)" font-size="10" font-family="monospace">timers</text>
    <text x="326" y="195" fill="rgba(61,214,140,0.4)"  font-size="10" font-family="monospace">I/O</text>
    <text x="190" y="302" fill="rgba(0,201,255,0.4)"  font-size="10" font-family="monospace">poll</text>
    <text x="72"  y="195" fill="rgba(65,184,131,0.4)"  font-size="10" font-family="monospace">check</text>
    <!-- Latency bars -->
    <text x="20" y="340" fill="rgba(65,184,131,0.5)" font-size="11" font-family="monospace">Response latency (p99)</text>
    <text x="20" y="364" fill="rgba(138,185,155,0.5)" font-size="10" font-family="monospace">Before:</text>
    <rect x="80"  y="352" width="240" height="16" rx="4" fill="rgba(255,95,87,0.3)" stroke="rgba(255,95,87,0.4)" stroke-width="1"/>
    <text x="330" y="364" fill="rgba(255,120,100,0.8)" font-size="10" font-family="monospace">420ms</text>
    <text x="20" y="392" fill="rgba(138,185,155,0.5)" font-size="10" font-family="monospace">After:</text>
    <rect x="80"  y="380" width="96"  height="16" rx="4" fill="rgba(65,184,131,0.35)" stroke="rgba(65,184,131,0.5)" stroke-width="1"/>
    <text x="186" y="392" fill="#41b883" font-size="10" font-family="monospace">62ms (-85%)</text>
    <!-- Redis label -->
    <rect x="20" y="416" width="380" height="52" rx="8" fill="rgba(65,184,131,0.06)" stroke="rgba(65,184,131,0.15)" stroke-width="1"/>
    <text x="210" y="440" text-anchor="middle" fill="rgba(65,184,131,0.6)" font-size="11" font-family="monospace">Redis cache hit rate</text>
    <text x="210" y="458" text-anchor="middle" fill="#3dd68c" font-size="18" font-family="'Inter',sans-serif" font-weight="900">94.7%</text>
  </g>
  <rect x="100" y="90" width="100" height="30" rx="15" fill="rgba(65,184,131,0.15)" stroke="rgba(65,184,131,0.4)" stroke-width="1"/>
  <text x="150" y="110" text-anchor="middle" fill="#41b883" font-size="12" font-family="'Inter',sans-serif" font-weight="600">Node.js</text>
  <text x="100" y="200" fill="#e8f5ee" font-size="54" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Node.js</text>
  <text x="100" y="260" fill="url(#g1)" font-size="54" font-family="'Inter',sans-serif" font-weight="900" letter-spacing="-2">Performance</text>
  <text x="100" y="314" fill="rgba(138,185,155,0.65)" font-size="30" font-family="'Inter',sans-serif" font-weight="600">Patterns at Scale</text>
  <text x="110" y="375" fill="#41b883" font-size="15" font-family="monospace">▸  Event loop optimization</text>
  <text x="110" y="401" fill="#3dd68c" font-size="15" font-family="monospace">▸  Worker threads for CPU tasks</text>
  <text x="110" y="427" fill="#00c9ff" font-size="15" font-family="monospace">▸  Redis caching strategies</text>
  <line x1="100" y1="458" x2="480" y2="458" stroke="rgba(65,184,131,0.2)" stroke-width="1"/>
  <circle cx="116" cy="498" r="18" fill="url(#g1)"/>
  <text x="116" y="504" text-anchor="middle" fill="white" font-size="13" font-family="'Inter',sans-serif" font-weight="700">MK</text>
  <text x="145" y="493" fill="#e8f5ee" font-size="14" font-family="'Inter',sans-serif" font-weight="600">Mehran Khan</text>
  <text x="145" y="511" fill="rgba(138,185,155,0.7)" font-size="12" font-family="'Inter',sans-serif">10 min read  ·  April 2024</text>
</svg>
