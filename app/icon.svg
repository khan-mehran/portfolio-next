<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883"/>
      <stop offset="100%" style="stop-color:#2d9768"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3dd68c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#41b883;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>
  <!-- MK monogram — tight, bold, centered -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900"
    font-size="13"
    fill="white"
    letter-spacing="-0.5"
  >MK</text>
</svg>
